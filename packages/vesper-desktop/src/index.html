<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vesper</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #1e1b4b;
        color: #e9e8ff;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        text-align: center;
        padding: 2rem;
      }
      .title { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.01em; }
      .hint { opacity: 0.7; max-width: 30rem; }
      code { background: rgba(255,255,255,0.08); padding: 0.1rem 0.4rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <!--
      Slice 1 fallback only. The main window loads the live Vesper World directly
      (http://127.0.0.1:4317, set in tauri.conf.json). This page is what `tauri build`
      bundles as frontendDist and is shown if that origin is unreachable; Slice 2 turns
      it into the real boot splash while the Bun daemon sidecar starts.
    -->
    <div class="wrap">
      <div class="title">Vesper</div>
      <div class="hint">
        Waiting for the local runtime. Start the daemon, then reopen:
        <br /><code>vesper daemon start</code>
      </div>
    </div>
  </body>
</html>

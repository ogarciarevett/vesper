<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vesper</title>
    <style>
      :root {
        --hearth: #3a2a22;      /* deepest warm brown ink */
        --wood: #6b4a35;        /* beams / frame / muted text */
        --plaster: #c89a6a;     /* lit wall + card body */
        --firelight: #ffb454;   /* fire, all-good, Run button */
        --ember: #ffd98a;       /* highlights / hover */
        --rug: #a8504a;         /* needs-a-look halo */
        --dusk: #5a6b8c;        /* the one cool note */
        --cream: #fff4e2;       /* high-contrast warm white */
        --ok: #ffb454;
        --err: #a8504a;
        --shadow: 0 18px 50px rgba(46, 33, 26, 0.5);
        --serif: Georgia, "Times New Roman", serif;
        --sans: "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background: #2e211a; color: var(--cream); font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
      }
      #scene { position: fixed; inset: 0; display: block; cursor: pointer; }

      .header {
        position: fixed; top: 0; left: 0; right: 0; padding: 20px 26px;
        display: flex; align-items: baseline; gap: 14px; pointer-events: none;
      }
      .header h1 {
        margin: 0; font-family: var(--serif); font-size: 30px; font-weight: 700;
        color: var(--cream); text-shadow: 0 1px 10px rgba(46, 33, 26, 0.6);
      }
      .header .sub { font-size: 15px; color: var(--ember); font-style: italic; }

      .hint {
        position: fixed; left: 0; right: 0; bottom: 18px; text-align: center;
        font-size: 15px; color: var(--ember); pointer-events: none;
        text-shadow: 0 1px 6px rgba(46, 33, 26, 0.7); transition: opacity .4s ease;
      }

      /* Inspect card — a warm "note left by the fire". */
      .card {
        position: fixed; right: 22px; top: 50%; transform: translateY(-50%) translateX(26px);
        width: min(380px, calc(100vw - 44px)); max-height: 84vh; overflow: auto;
        background: var(--plaster); border: 3px solid var(--wood); border-radius: 18px;
        box-shadow: var(--shadow); padding: 22px; opacity: 0; pointer-events: none;
        color: var(--hearth); transition: opacity .25s ease, transform .25s ease;
      }
      .card.open { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
      .card .top { display: flex; align-items: center; gap: 14px; }
      .card .portrait {
        width: 64px; height: 64px; border-radius: 50%; background: rgba(46, 33, 26, 0.12);
        border: 2px solid var(--wood); flex: none; image-rendering: pixelated;
      }
      .card .name { font-family: var(--serif); font-size: 26px; font-weight: 700; margin: 0; }
      .card .status { display: inline-flex; align-items: center; gap: 8px; font-size: 20px;
        color: var(--wood); margin: 14px 0 4px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--wood); }
      .dot.ok { background: var(--firelight); box-shadow: 0 0 10px var(--firelight); }
      .dot.error { background: var(--err); box-shadow: 0 0 10px var(--err); }
      .dot.working { background: var(--ember); box-shadow: 0 0 10px var(--ember); animation: pulse 1s infinite; }
      .card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--wood); margin: 16px 0 6px; }
      .card .summary { font-size: 18px; line-height: 1.55; color: var(--hearth);
        background: rgba(46, 33, 26, 0.08); border-radius: 12px; padding: 12px 14px; white-space: pre-wrap; word-break: break-word; }
      .card .meta { font-size: 14px; color: var(--wood); margin-top: 10px; }
      .runbtn {
        margin-top: 20px; width: 100%; min-height: 56px; padding: 14px; border: none; border-radius: 14px;
        font-family: var(--sans); font-size: 20px; font-weight: 700; letter-spacing: .5px;
        color: var(--hearth); background: var(--firelight); cursor: pointer;
        transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
        box-shadow: 0 8px 20px rgba(168, 80, 74, 0.3);
      }
      .runbtn:hover { background: var(--ember); transform: translateY(-1px); box-shadow: 0 10px 26px rgba(255, 180, 84, 0.45); }
      .runbtn:active { transform: translateY(1px); }
      .runbtn:disabled { filter: grayscale(0.5) brightness(0.92); cursor: default; transform: none; }

      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

      .toast {
        position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%) translateY(16px);
        background: var(--plaster); color: var(--hearth); border: 2px solid var(--wood); border-radius: 12px;
        padding: 12px 20px; font-size: 15px; box-shadow: var(--shadow);
        opacity: 0; pointer-events: none; transition: opacity .3s ease, transform .3s ease;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* First-launch welcome. */
      .welcome-scrim {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        background: rgba(28, 18, 12, 0.72); z-index: 10;
      }
      .welcome-scrim.show { display: flex; }
      .welcome {
        width: min(440px, calc(100vw - 48px)); text-align: center; color: var(--hearth);
        background: var(--plaster); border: 3px solid var(--wood); border-radius: 22px;
        box-shadow: var(--shadow); padding: 36px 32px;
      }
      .welcome h2 { margin: 0 0 14px; font-family: var(--serif); font-size: 28px; }
      .welcome p { margin: 0 0 12px; font-size: 17px; line-height: 1.6; }
      .welcome p.dim { color: var(--wood); font-size: 15px; }
      .welcome .go {
        margin-top: 22px; min-height: 56px; padding: 15px 34px; border: none; border-radius: 14px;
        font-family: var(--sans); font-size: 19px; font-weight: 700;
        color: var(--hearth); background: var(--firelight); cursor: pointer;
        box-shadow: 0 8px 20px rgba(168, 80, 74, 0.3); transition: transform .12s ease, background .12s ease;
      }
      .welcome .go:hover { background: var(--ember); transform: translateY(-1px); }
      .welcome .go:active { transform: translateY(1px); }

      @media (prefers-reduced-motion: reduce) {
        .card, .toast, .runbtn, .welcome .go { transition: none; }
        .dot.working { animation: none; }
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="welcome-scrim" id="welcome">
      <div class="welcome">
        <h2>Welcome home</h2>
        <p>These little friends by the fire are your helpers. They quietly do things for you.</p>
        <p>Tap one to see what it just did — or tap <strong>Run</strong> to put it to work.</p>
        <p class="dim">That's it. Nothing to set up.</p>
        <button type="button" class="go" id="welcome-go">Let's go</button>
      </div>
    </div>
    <div class="header">
      <h1>Vesper</h1>
      <span class="sub">your helpers, by the fire</span>
    </div>
    <div class="hint" id="hint">tap a helper to see what it's doing</div>
    <div class="card" id="card">
      <div class="top">
        <canvas class="portrait" id="card-portrait" width="64" height="64"></canvas>
        <div>
          <div class="name" id="card-name"></div>
          <div class="status"><span class="dot" id="card-dot"></span><span id="card-status"></span></div>
        </div>
      </div>
      <div class="label">last result</div>
      <div class="summary" id="card-summary"></div>
      <div class="meta" id="card-meta"></div>
      <button type="button" class="runbtn" id="card-run">Run</button>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

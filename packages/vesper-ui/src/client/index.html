<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vesper</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2l1.8 6.4L20 12l-6.2 1.8L12 22l-1.8-8.2L4 12l6.2-3.6z' fill='%237c5cff'/%3E%3C/svg%3E"
    />
    <style>
      /* ── Vesper design system ────────────────────────────────────────────────
         Dark glass is the default app surface (OpenClaw-style); light "glass" and
         "hearth" are opt-in palettes selected via <body data-theme>. Sections inject
         their own scoped styles and compose the primitives defined here. */
      :root {
        --bg: radial-gradient(125% 125% at 12% -12%, #16131f 0%, #0c0b12 55%, #07060c 100%);
        --ink: #e9e8f2;
        --ink-soft: #9a98ab;
        --ink-faint: #6b6980;
        --surface: rgba(28, 27, 40, 0.55);
        --surface-2: rgba(40, 39, 55, 0.55);
        --surface-strong: rgba(32, 31, 46, 0.88);
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.15);
        --accent: #7c5cff;
        --accent-2: #9a7dff;
        --accent-soft: rgba(124, 92, 255, 0.16);
        --ok: #3ad07f;
        --warn: #ffba5a;
        --danger: #ff6b8b;
        --sidebar-bg: rgba(14, 13, 21, 0.72);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        --blur: blur(22px) saturate(1.3);
        --radius: 14px;
        --sidebar-w: 250px;
        --titlebar-h: 48px;
        --tb-inset: 16px;
        --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
        --mono: ui-monospace, "SF Mono", Menlo, monospace;
        /* sidebar glyph accents */
        --g-violet: #9a7dff; --g-blue: #5aa6ff; --g-teal: #3fd9c9;
        --g-pink: #ff7eb6; --g-amber: #ffba5a; --g-green: #3ad07f; --g-slate: #9a98ab;
      }
      [data-theme="glass"] {
        --bg: linear-gradient(160deg, #f4f3fe 0%, #eef2fe 52%, #fdeef5 100%);
        --ink: #2a2740; --ink-soft: #6b6880; --ink-faint: #9a96b0;
        --surface: rgba(255, 255, 255, 0.6);
        --surface-2: rgba(255, 255, 255, 0.5);
        --surface-strong: rgba(255, 255, 255, 0.86);
        --border: rgba(120, 110, 165, 0.16);
        --border-strong: rgba(120, 110, 165, 0.26);
        --accent-soft: rgba(124, 92, 255, 0.12);
        --sidebar-bg: rgba(255, 255, 255, 0.55);
        --shadow: 0 18px 50px rgba(80, 70, 140, 0.18);
      }
      [data-theme="hearth"] {
        --bg: radial-gradient(120% 120% at 50% -10%, #3a2a20 0%, #2a1d16 60%, #21160f 100%);
        --ink: #f3e7da; --ink-soft: #c4a585; --ink-faint: #8f7257;
        --surface: rgba(70, 49, 35, 0.6);
        --surface-2: rgba(84, 60, 44, 0.55);
        --surface-strong: rgba(60, 42, 30, 0.9);
        --border: rgba(255, 214, 170, 0.13);
        --border-strong: rgba(255, 214, 170, 0.22);
        --accent: #ffb454; --accent-2: #ffd98a; --accent-soft: rgba(255, 180, 84, 0.16);
        --sidebar-bg: rgba(40, 28, 20, 0.82);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
        --font: Georgia, "Times New Roman", serif;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background: var(--bg); color: var(--ink); font-family: var(--font);
        -webkit-font-smoothing: antialiased; font-size: 15px;
      }
      body.native-mac { --tb-inset: 84px; }
      ::-webkit-scrollbar { width: 11px; height: 11px; }
      ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
      ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); background-clip: content-box; }

      /* ── Titlebar (custom, draggable) ─────────────────────────────────────── */
      .titlebar {
        position: fixed; top: 0; left: 0; right: 0; height: var(--titlebar-h);
        display: flex; align-items: center; gap: 16px;
        padding: 0 14px 0 var(--tb-inset); z-index: 30;
        background: linear-gradient(var(--sidebar-bg), color-mix(in srgb, var(--sidebar-bg) 10%, transparent));
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        border-bottom: 1px solid var(--border);
        -webkit-app-region: drag; app-region: drag;
      }
      .no-drag { -webkit-app-region: no-drag; app-region: no-drag; }
      .tb-brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; color: var(--ink); }
      .tb-mark { width: 18px; height: 18px; color: var(--accent); display: grid; place-items: center; }
      .tb-mark svg { width: 18px; height: 18px; }
      .tb-search { position: relative; flex: 0 1 440px; display: flex; align-items: center; }
      .tb-search-ic { position: absolute; left: 11px; width: 15px; height: 15px; color: var(--ink-faint); pointer-events: none; display: grid; place-items: center; }
      .tb-search-ic svg { width: 15px; height: 15px; }
      .tb-search input {
        width: 100%; height: 34px; padding: 0 12px 0 34px; border-radius: 9px;
        border: 1px solid var(--border); background: var(--surface); color: var(--ink);
        font: inherit; font-size: 13.5px; -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
      }
      .tb-search input::placeholder { color: var(--ink-faint); }
      .tb-search input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      .tb-results {
        position: absolute; top: 42px; left: 0; right: 0; background: var(--surface-strong);
        border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow);
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        padding: 6px; z-index: 40; display: flex; flex-direction: column; gap: 2px;
      }
      .tb-result { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; border: none; background: transparent; color: var(--ink); font: inherit; font-size: 13.5px; cursor: pointer; text-align: left; }
      .tb-result:hover { background: var(--accent-soft); }
      .tb-result .glyph { width: 16px; height: 16px; color: var(--ink-soft); display: grid; place-items: center; }
      .tb-result .glyph svg { width: 16px; height: 16px; }
      .tb-pills { margin-left: auto; display: flex; gap: 8px; }
      .tb-pill { display: inline-flex; align-items: center; gap: 7px; height: 28px; padding: 0 11px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); font-size: 12.5px; color: var(--ink-soft); }
      .tb-dot { width: 7px; height: 7px; color: var(--ink-faint); display: grid; place-items: center; }
      .tb-dot svg { width: 7px; height: 7px; }
      .tb-pill[data-ok="true"] .tb-dot { color: var(--ok); }
      .tb-pill[data-ok="false"] .tb-dot { color: var(--danger); }

      /* ── App body: sidebar + content ──────────────────────────────────────── */
      .app { position: fixed; top: var(--titlebar-h); left: 0; right: 0; bottom: 0; display: flex; }
      .sidebar {
        width: var(--sidebar-w); flex: none; background: var(--sidebar-bg);
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        border-right: 1px solid var(--border); padding: 6px 10px 16px; overflow-y: auto;
        display: flex; flex-direction: column;
      }
      .nav { display: flex; flex-direction: column; gap: 2px; }
      .nav-group { font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink-faint); padding: 16px 12px 6px; font-weight: 700; }
      .navi {
        display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 10px;
        border: none; background: transparent; color: var(--ink-soft); font: inherit;
        font-size: 14.5px; font-weight: 500; cursor: pointer; text-align: left; width: 100%;
        position: relative; transition: background 0.12s ease, color 0.12s ease;
      }
      .navi:hover { background: var(--surface); color: var(--ink); }
      .navi[aria-current="true"] { background: var(--surface-strong); color: var(--ink); }
      .navi[aria-current="true"]::before { content: ""; position: absolute; left: 3px; top: 9px; bottom: 9px; width: 3px; border-radius: 3px; background: var(--accent); }
      .navi:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
      .navi .glyph { width: 20px; height: 20px; flex: none; display: grid; place-items: center; color: var(--g-slate); }
      .navi .glyph svg { width: 19px; height: 19px; }
      .navi[data-accent="violet"] .glyph { color: var(--g-violet); }
      .navi[data-accent="blue"] .glyph { color: var(--g-blue); }
      .navi[data-accent="teal"] .glyph { color: var(--g-teal); }
      .navi[data-accent="pink"] .glyph { color: var(--g-pink); }
      .navi[data-accent="amber"] .glyph { color: var(--g-amber); }
      .navi[data-accent="green"] .glyph { color: var(--g-green); }
      .navi[data-accent="slate"] .glyph { color: var(--g-slate); }

      .content { flex: 1; overflow-y: auto; padding: 26px 32px 56px; outline: none; }
      .content.flush { padding: 0; overflow: hidden; }

      /* ── Section primitives (shared toolkit) ──────────────────────────────── */
      .sec-head { margin: 2px 0 22px; }
      .sec-title { font-size: 23px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
      .sec-sub { margin: 6px 0 0; color: var(--ink-soft); font-size: 15px; max-width: 64ch; }
      .sec-error { padding: 28px 32px; }
      .panel {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur); box-shadow: var(--shadow);
        padding: 18px 20px;
      }
      .panel + .panel { margin-top: 16px; }
      .panel-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin: 0 0 12px; font-weight: 700; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
      @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
      .kv { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14.5px; }
      .kv:last-child { border-bottom: none; }
      .kv .k { color: var(--ink-soft); }
      .kv .v { color: var(--ink); font-variant-numeric: tabular-nums; text-align: right; }
      .kv .v.mono { font-family: var(--mono); font-size: 12.5px; }
      .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 12.5px; font-weight: 600; background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-soft); }
      .badge.ok { color: var(--ok); } .badge.warn { color: var(--warn); } .badge.danger { color: var(--danger); }
      .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex: none; }
      .btn {
        min-height: 40px; padding: 0 18px; border-radius: 11px; border: 1px solid var(--border-strong);
        background: var(--surface-2); color: var(--ink); font: inherit; font-weight: 600; font-size: 14px;
        cursor: pointer; transition: background 0.12s ease, transform 0.1s ease;
      }
      .btn:hover { background: var(--surface-strong); }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: 0.5; cursor: default; transform: none; }
      .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .btn.primary { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 8px 22px rgba(124, 92, 255, 0.3); }
      .btn.primary:hover { background: var(--accent-2); }
      input.field, textarea.field, select.field {
        width: 100%; padding: 10px 13px; border-radius: 11px; border: 1px solid var(--border);
        background: var(--surface-2); color: var(--ink); font: inherit; font-size: 14.5px;
      }
      textarea.field { resize: vertical; min-height: 80px; font-family: var(--mono); font-size: 13px; }
      .field:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      .muted { color: var(--ink-soft); }
      .empty-note { color: var(--ink-soft); font-style: italic; padding: 8px 0; }
      .coming-soon {
        margin-top: 8px; display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
        max-width: 60ch; color: var(--ink-soft); font-size: 15px; line-height: 1.6;
      }
      .coming-soon .cs-tag { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent-2); font-weight: 700; }

      /* ── Toast ────────────────────────────────────────────────────────────── */
      .toast {
        position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(16px);
        background: var(--surface-strong); color: var(--ink); border: 1px solid var(--border);
        border-radius: 12px; -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        padding: 11px 18px; font-size: 14px; box-shadow: var(--shadow); z-index: 50;
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      @media (prefers-reduced-motion: reduce) {
        * { transition: none !important; animation: none !important; }
      }
    </style>
  </head>
  <body data-theme="dark">
    <div class="titlebar" id="titlebar"></div>
    <div class="app">
      <aside class="sidebar">
        <nav class="nav" id="nav" aria-label="Sections"></nav>
      </aside>
      <main class="content" id="section-host" tabindex="-1" aria-live="polite"></main>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

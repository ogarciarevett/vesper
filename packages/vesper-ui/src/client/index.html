<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vesper</title>
    <style>
      :root {
        --bg-0: #0b1020;
        --bg-1: #131a33;
        --ink: #e8ecff;
        --ink-dim: #8a93c2;
        --accent: #7cf3d0;
        --accent-warm: #ffd479;
        --ok: #7CF3A0;
        --err: #ff9a8b;
        --panel: rgba(18, 24, 48, 0.86);
        --panel-edge: rgba(124, 243, 208, 0.25);
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.55);
        --font: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; overflow: hidden;
        background: var(--bg-0); color: var(--ink); font-family: var(--font);
        -webkit-font-smoothing: antialiased;
      }
      #scene { position: fixed; inset: 0; display: block; image-rendering: pixelated; cursor: pointer; }

      .header {
        position: fixed; top: 0; left: 0; right: 0; padding: 22px 28px;
        display: flex; align-items: baseline; gap: 14px; pointer-events: none;
        background: linear-gradient(180deg, rgba(11,16,32,0.7), rgba(11,16,32,0));
      }
      .header h1 {
        margin: 0; font-size: 22px; letter-spacing: 6px; font-weight: 700;
        text-transform: uppercase; color: var(--ink);
        text-shadow: 0 0 18px rgba(124, 243, 208, 0.35);
      }
      .header .sub { font-size: 13px; color: var(--ink-dim); letter-spacing: 1px; }

      .hint {
        position: fixed; left: 0; right: 0; bottom: 18px; text-align: center;
        font-size: 13px; color: var(--ink-dim); letter-spacing: 1px; pointer-events: none;
        transition: opacity .4s ease;
      }

      /* Inspect card */
      .card {
        position: fixed; right: 22px; top: 50%; transform: translateY(-50%) translateX(24px);
        width: min(360px, calc(100vw - 44px)); max-height: 80vh; overflow: auto;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 18px;
        box-shadow: var(--shadow); backdrop-filter: blur(10px);
        padding: 22px; opacity: 0; pointer-events: none;
        transition: opacity .25s ease, transform .25s ease;
      }
      .card.open { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
      .card .name { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin: 0 0 4px; }
      .card .status { display: inline-flex; align-items: center; gap: 8px; font-size: 13px;
        color: var(--ink-dim); margin-bottom: 16px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink-dim); }
      .dot.ok { background: var(--ok); box-shadow: 0 0 12px var(--ok); }
      .dot.error { background: var(--err); box-shadow: 0 0 12px var(--err); }
      .dot.working { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 1s infinite; }
      .card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--ink-dim); margin: 14px 0 6px; }
      .card .summary { font-size: 15px; line-height: 1.5; color: var(--ink);
        background: rgba(0,0,0,0.22); border-radius: 12px; padding: 12px 14px; white-space: pre-wrap; word-break: break-word; }
      .card .meta { font-size: 12px; color: var(--ink-dim); margin-top: 10px; }
      .runbtn {
        margin-top: 20px; width: 100%; padding: 16px; border: none; border-radius: 14px;
        font-family: var(--font); font-size: 17px; font-weight: 700; letter-spacing: 1px;
        color: #08210f; background: linear-gradient(180deg, var(--accent), #46c9a6);
        cursor: pointer; transition: transform .12s ease, filter .12s ease;
        box-shadow: 0 8px 24px rgba(124, 243, 208, 0.35);
      }
      .runbtn:hover { filter: brightness(1.07); transform: translateY(-1px); }
      .runbtn:active { transform: translateY(1px); }
      .runbtn:disabled { filter: grayscale(0.6) brightness(0.8); cursor: default; transform: none; }

      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

      .toast {
        position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%) translateY(16px);
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 12px;
        padding: 12px 20px; font-size: 14px; box-shadow: var(--shadow);
        opacity: 0; pointer-events: none; transition: opacity .3s ease, transform .3s ease;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* First-launch welcome */
      .welcome-scrim {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        background: rgba(7, 10, 22, 0.72); backdrop-filter: blur(6px); z-index: 10;
      }
      .welcome-scrim.show { display: flex; }
      .welcome {
        width: min(440px, calc(100vw - 48px)); text-align: center;
        background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 22px;
        box-shadow: var(--shadow); padding: 36px 32px;
      }
      .welcome h2 {
        margin: 0 0 14px; font-size: 24px; letter-spacing: 3px; text-transform: uppercase;
        text-shadow: 0 0 18px rgba(124, 243, 208, 0.35);
      }
      .welcome p { margin: 0 0 12px; font-size: 16px; line-height: 1.6; color: var(--ink); }
      .welcome p.dim { color: var(--ink-dim); font-size: 14px; }
      .welcome .go {
        margin-top: 22px; padding: 15px 34px; border: none; border-radius: 14px;
        font-family: var(--font); font-size: 17px; font-weight: 700; letter-spacing: 1px;
        color: #08210f; background: linear-gradient(180deg, var(--accent), #46c9a6);
        cursor: pointer; box-shadow: 0 8px 24px rgba(124, 243, 208, 0.35);
        transition: transform .12s ease, filter .12s ease;
      }
      .welcome .go:hover { filter: brightness(1.07); transform: translateY(-1px); }
      .welcome .go:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="welcome-scrim" id="welcome">
      <div class="welcome">
        <h2>Welcome</h2>
        <p>These little characters are your agents. They quietly do things for you.</p>
        <p>Tap one to see what it just did — or tap <strong>Run</strong> to put it to work.</p>
        <p class="dim">That's it. Nothing to set up.</p>
        <button type="button" class="go" id="welcome-go">Let's go</button>
      </div>
    </div>
    <div class="header">
      <h1>Vesper</h1>
      <span class="sub">your agents</span>
    </div>
    <div class="hint" id="hint">tap an agent to see what it's doing</div>
    <div class="card" id="card">
      <div class="name" id="card-name"></div>
      <div class="status"><span class="dot" id="card-dot"></span><span id="card-status"></span></div>
      <div class="label">last result</div>
      <div class="summary" id="card-summary"></div>
      <div class="meta" id="card-meta"></div>
      <button type="button" class="runbtn" id="card-run">Run</button>
    </div>
    <div class="toast" id="toast"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>

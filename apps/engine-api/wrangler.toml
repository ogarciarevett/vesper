name = "engine-api"
main = "src/index.ts"
compatibility_date = "2026-02-14"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "TRADING_ROOM"
class_name = "TradingRoom"

[[durable_objects.bindings]]
name = "BOT_INSTANCE"
class_name = "BotInstance"

[[migrations]]
tag = "v1"
new_classes = ["GameRoom", "BotInstance"]

[[migrations]]
tag = "v2"
renamed_classes = [{from = "GameRoom", to = "TradingRoom"}]

[[r2_buckets]]
binding = "OPENCLAW_DATA"
bucket_name = "openclaw-village-data"

[ai]
binding = "AI"

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint, format & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      # Frozen lockfile fails the build if bun.lock is out of date — also guards
      # the "no provider SDK in the lockfile" Foundation acceptance criterion.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `biome ci` is the CI-optimized gate: linter + formatter + import sorting,
      # never writes, exits non-zero on any issue. Mirrors local `bun run lint`.
      - name: Lint, format & import order
        run: bunx biome ci .

      - name: Run tests
        run: bun test

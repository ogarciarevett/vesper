name: release

# Publish the bundled CLI to npm as `@ogarciarevett/vesper` when a version tag is
# pushed. The bundle is built by `bun run build:dist`; npm provenance attests it was
# built here from this commit. Requires an `NPM_TOKEN` repo secret.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm --provenance needs an OIDC token

jobs:
  publish:
    name: build and publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Never publish a red build: run the same gate as CI before bundling.
      - name: Lint, format and test
        run: |
          bunx biome ci .
          bun test

      # The tag must match the version build:dist reads from package.json.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag v$tag does not match package.json version $pkg" >&2
            exit 1
          fi

      - name: Build distributable
        run: bun run build:dist

      - name: Set up Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
